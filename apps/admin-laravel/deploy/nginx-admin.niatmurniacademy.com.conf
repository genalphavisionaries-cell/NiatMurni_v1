# Nginx config for https://admin.niatmurniacademy.com (Laravel + Filament at root)
# Install: sudo cp deploy/nginx-admin.niatmurniacademy.com.conf /etc/nginx/sites-available/
#          sudo ln -s /etc/nginx/sites-available/nginx-admin.niatmurniacademy.com.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL: Use certbot or add listen 443 ssl; and ssl_certificate / path after obtaining certs.

server {
    listen 80;
    listen [::]:80;
    server_name admin.niatmurniacademy.com;

    # CRITICAL: Laravel entry point is public/index.php — root MUST be .../public
    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
